spring.application.name=ucl-backend

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/ucl_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8081

# ===== JWT =====
# Base64-ish long secret (HMAC-SHA). Change in production.
app.jwt.secret=ChangeThisToALongRandomSecretKeyForUclChampionsLeagueAppSigning1234567890
app.jwt.expiration-ms=86400000

# ===== Default seeded accounts (created on first boot) =====
app.seed.admin-username=admin
app.seed.admin-password=admin123
app.seed.user-username=user
app.seed.user-password=user123

# ===== Fixture generator =====
app.fixtures.max-attempts=20000
